<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <clipPath id="r"><rect width="800" height="200" rx="12" ry="12"/></clipPath>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#111128"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="45"/></filter>
    <filter id="glow2"><feGaussianBlur stdDeviation="25"/></filter>
  </defs>
  <g clip-path="url(#r)">
    <rect width="800" height="200" fill="url(#bg)"/>
    <!-- Blue glow behind stars -->
    <ellipse cx="140" cy="100" rx="120" ry="100" fill="#003399" opacity="0.18" filter="url(#glow)"/>
    <!-- Warm golden glow top right -->
    <ellipse cx="660" cy="50" rx="160" ry="90" fill="#FFCC00" opacity="0.05" filter="url(#glow)"/>
    <!-- Subtle golden glow behind title -->
    <ellipse cx="490" cy="100" rx="200" ry="60" fill="#FFCC00" opacity="0.03" filter="url(#glow2)"/>
    <!-- 12 stars -->
    <g transform="translate(140,100)" fill="#FFCC00" opacity="0.85">
      <g transform="rotate(0)   translate(0,-58)"><polygon points="0,-7.5 2.2,-2.8 7,-2.3 3.5,1 4.4,6 0,3.5 -4.4,6 -3.5,1 -7,-2.3 -2.2,-2.8"/></g>
      <g transform="rotate(30)  translate(0,-58)"><polygon points="0,-7.5 2.2,-2.8 7,-2.3 3.5,1 4.4,6 0,3.5 -4.4,6 -3.5,1 -7,-2.3 -2.2,-2.8"/></g>
      <g transform="rotate(60)  translate(0,-58)"><polygon points="0,-7.5 2.2,-2.8 7,-2.3 3.5,1 4.4,6 0,3.5 -4.4,6 -3.5,1 -7,-2.3 -2.2,-2.8"/></g>
      <g transform="rotate(90)  translate(0,-58)"><polygon points="0,-7.5 2.2,-2.8 7,-2.3 3.5,1 4.4,6 0,3.5 -4.4,6 -3.5,1 -7,-2.3 -2.2,-2.8"/></g>
      <g transform="rotate(120) translate(0,-58)"><polygon points="0,-7.5 2.2,-2.8 7,-2.3 3.5,1 4.4,6 0,3.5 -4.4,6 -3.5,1 -7,-2.3 -2.2,-2.8"/></g>
      <g transform="rotate(150) translate(0,-58)"><polygon points="0,-7.5 2.2,-2.8 7,-2.3 3.5,1 4.4,6 0,3.5 -4.4,6 -3.5,1 -7,-2.3 -2.2,-2.8"/></g>
      <g transform="rotate(180) translate(0,-58)"><polygon points="0,-7.5 2.2,-2.8 7,-2.3 3.5,1 4.4,6 0,3.5 -4.4,6 -3.5,1 -7,-2.3 -2.2,-2.8"/></g>
      <g transform="rotate(210) translate(0,-58)"><polygon points="0,-7.5 2.2,-2.8 7,-2.3 3.5,1 4.4,6 0,3.5 -4.4,6 -3.5,1 -7,-2.3 -2.2,-2.8"/></g>
      <g transform="rotate(240) translate(0,-58)"><polygon points="0,-7.5 2.2,-2.8 7,-2.3 3.5,1 4.4,6 0,3.5 -4.4,6 -3.5,1 -7,-2.3 -2.2,-2.8"/></g>
      <g transform="rotate(270) translate(0,-58)"><polygon points="0,-7.5 2.2,-2.8 7,-2.3 3.5,1 4.4,6 0,3.5 -4.4,6 -3.5,1 -7,-2.3 -2.2,-2.8"/></g>
      <g transform="rotate(300) translate(0,-58)"><polygon points="0,-7.5 2.2,-2.8 7,-2.3 3.5,1 4.4,6 0,3.5 -4.4,6 -3.5,1 -7,-2.3 -2.2,-2.8"/></g>
      <g transform="rotate(330) translate(0,-58)"><polygon points="0,-7.5 2.2,-2.8 7,-2.3 3.5,1 4.4,6 0,3.5 -4.4,6 -3.5,1 -7,-2.3 -2.2,-2.8"/></g>
    </g>
    <!-- Title: single line -->
    <text x="490" y="95" text-anchor="middle" font-family="'SF Pro Display',Inter,system-ui,Helvetica,Arial,sans-serif" font-size="54" fill="#fff" font-weight="700" letter-spacing="1">awesome-<tspan fill="#FFCC00">europe</tspan></text>
    <!-- Thin accent line -->
    <rect x="390" y="110" width="200" height="1.5" rx="1" fill="#FFCC00" opacity="0.35"/>
    <!-- Subtitle -->
    <text x="490" y="135" text-anchor="middle" font-family="'SF Pro Display',Inter,system-ui,Helvetica,Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.35)" font-weight="300" letter-spacing="4">OPEN SOURCE FOR EUROPE</text>
  </g>
</svg>